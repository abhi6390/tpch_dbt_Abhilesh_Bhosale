version: 2

models:

  # ------------------------------------------------------------------
  # MART_ORDER_SUMMARY
  # ------------------------------------------------------------------
  - name: mart_order_summary
    description: "Order-level fact table containing aggregated metrics for each order."

    columns:
      - name: order_key
        description: "Unique order identifier."
        tests:
          - unique
          - not_null

      - name: customer_key
        description: "Customer who placed the order."

      - name: order_date
        description: "Date the order was placed."

      - name: order_status
        description: "Current status of the order."

      - name: order_priority
        description: "Priority assigned to the order."

      - name: total_line_items
        description: "Total number of line items in the order."

      - name: total_quantity
        description: "Total quantity ordered."

      - name: total_extended_price
        description: "Sum of extended price across line items."

      - name: total_effective_revenue
        description: "Revenue after discounts."

      - name: total_discount_amount
        description: "Total discount amount applied."

      - name: avg_discount_pct
        description: "Average discount percentage."

      - name: has_returned_items
        description: "Indicates whether the order contains any returned items."

  # ------------------------------------------------------------------
  # MART_CUSTOMER_METRICS
  # ------------------------------------------------------------------
  - name: mart_customer_metrics
    description: "Customer-level metrics including revenue, order history and spend tier."

    columns:
      - name: customer_key
        description: "Unique customer identifier."
        tests:
          - unique
          - not_null

      - name: customer_name
        description: "Customer name."

      - name: market_segment
        description: "Customer market segment."

      - name: acct_balance
        description: "Customer account balance."

      - name: total_orders
        description: "Total number of orders."

      - name: total_revenue
        description: "Total revenue generated by the customer."

      - name: avg_order_value
        description: "Average revenue per order."

      - name: first_order_date
        description: "Date of the customer's first order."

      - name: last_order_date
        description: "Date of the customer's most recent order."

      - name: days_as_customer
        description: "Days between the first and last order."

      - name: spend_tier
        description: "Revenue-based customer classification."
        tests:
          - accepted_values:
              values:
                - PLATINUM
                - GOLD
                - SILVER
                - BRONZE